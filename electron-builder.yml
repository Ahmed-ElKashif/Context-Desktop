appId: com.contexters.context
productName: Context
copyright: Copyright © 2026 Context
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  include: build/installer.nsh
  license: build/license.txt
  installerSidebar: build/installerSidebar.bmp
publish:
  provider: github
  owner: Ahmed-ElKashif
  repo: Context-Desktop
