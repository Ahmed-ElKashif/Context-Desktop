<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark polished background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E28" />
      <stop offset="50%" stop-color="#0F0F15" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>

    <!-- Core pulse gradient (Purple) -->
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" /> <!-- violet-400 -->
      <stop offset="100%" stop-color="#7C3AED" /> <!-- violet-600 -->
    </linearGradient>

    <!-- Accent gradient (Blue) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" /> <!-- blue-400 -->
      <stop offset="100%" stop-color="#2563EB" /> <!-- blue-600 -->
    </linearGradient>

    <!-- Node gradient (White-ish) -->
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#D1D5DB" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Core Heavy Glow Filter -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Background Squircle Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background Squircle -->
  <!-- 896 width/height in 1024 viewBox leaves 64px padding for shadows -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bgGradient)" filter="url(#dropShadow)" />
  <!-- Glassmorphic Inner Borders -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="none" stroke="#2A2A35" stroke-width="4" />
  <rect x="66" y="66" width="892" height="892" rx="222" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" />

  <!-- Logo Group -->
  <!-- We scale the 0-100 viewBox shape by 12 to make it larger, and center it in the 1024px canvas (translate -88, -148) -->
  <g transform="translate(-88, -148) scale(12)">
    <!-- Path 1 (Top Left to Core) -->
    <path d="M30 30 C 30 30, 45 45, 50 50" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Path 2 (Top Right to Core) -->
    <path d="M70 30 C 70 30, 55 45, 50 50" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Path 3 (Bottom to Core) -->
    <path d="M50 80 C 50 80, 50 65, 50 50" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8" />

    <!-- Top Left Node -->
    <circle cx="30" cy="30" r="6" fill="url(#nodeGradient)" />

    <!-- Top Right Node -->
    <circle cx="70" cy="30" r="6" fill="url(#nodeGradient)" />

    <!-- Bottom Node -->
    <circle cx="50" cy="80" r="6" fill="url(#accentGradient)" />

    <!-- Central Core Outer Ring (matching radius 10 from original) -->
    <circle cx="50" cy="50" r="11" stroke="url(#coreGradient)" stroke-width="2.5" fill="none" opacity="0.8" />

    <!-- Central Core Inner Solid (matching radius 6 from original) -->
    <circle cx="50" cy="50" r="6.5" fill="url(#coreGradient)" />
  </g>
</svg>
