<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    :root {
      --top-circle: rgba(36, 44, 52, 0.6);
      --top-path: #e2e8f0;
      --bottom-circle: rgba(255, 126, 95, 0.8);
      --bottom-path: rgba(255, 126, 95, 0.6);
      --center-outer: rgba(16, 55, 102, 0.5);
      --center-inner: #103766;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --top-circle: rgba(255, 255, 255, 0.4);
        --top-path: rgba(255, 255, 255, 0.2);
        --bottom-circle: rgba(59, 130, 246, 0.6);
        --bottom-path: rgba(59, 130, 246, 0.4);
        --center-outer: rgba(139, 92, 246, 0.5);
        --center-inner: #8b5cf6;
      }
    }
    .top-circle { fill: var(--top-circle); }
    .top-path { stroke: var(--top-path); }
    .bottom-circle { fill: var(--bottom-circle); }
    .bottom-path { stroke: var(--bottom-path); }
    .center-outer { stroke: var(--center-outer); }
    .center-inner { fill: var(--center-inner); }
  </style>

  <circle cx="30" cy="30" r="6" class="top-circle" />
  <path d="M30 30 C 30 30, 45 45, 50 50" class="top-path" stroke-width="3" stroke-linecap="round" />
  
  <circle cx="70" cy="30" r="6" class="top-circle" />
  <path d="M70 30 C 70 30, 55 45, 50 50" class="top-path" stroke-width="3" stroke-linecap="round" />
  
  <circle cx="50" cy="80" r="6" class="bottom-circle" />
  <path d="M50 80 C 50 80, 50 65, 50 50" class="bottom-path" stroke-width="3" stroke-linecap="round" />
  
  <circle cx="50" cy="50" r="10" class="center-outer" stroke-width="2" />
  <circle cx="50" cy="50" r="6" class="center-inner" />
</svg>