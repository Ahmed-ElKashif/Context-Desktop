<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context - AI Document Intelligence</title>

  <!-- 
    Content Security Policy (CSP)
    - Prevents loading external malicious scripts (script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com)
    - Allows Google Fonts (style-src, font-src)
    - Allows images from anywhere securely (img-src 'self' data: blob: https: file:)
    - Allows API connections (connect-src 'self' http: https: ws: wss:)
    - Allows PDF.js worker (worker-src 'self' blob: file:)
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: file:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob: file:; object-src 'none';" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Fira+Code:wght@300..700&family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
